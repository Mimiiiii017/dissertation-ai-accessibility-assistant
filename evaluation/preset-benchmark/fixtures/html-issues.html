<!DOCTYPE html>
<!-- Missing lang attribute on <html> -->
<html>
<head>
  <meta charset="UTF-8">
  <title>Shop — Products</title>
</head>
<body>

  <!-- Logo image with no alt text -->
  <div class="header">
    <img src="/logo.png">
    <div class="nav">
      <a href="/">Home</a>
      <a href="/shop">Shop</a>
      <a href="/contact">Contact</a>
    </div>
  </div>

  <!-- Inline style: colour #ccc on background #eee — very low contrast (~1.4:1) -->
  <div class="hero" style="background:#eee; color:#ccc">
    <h1>Welcome to our store</h1>
    <p>Find the best deals today!</p>
  </div>

  <div class="products">
    <!-- Skips h2 / h3 — jumps straight to h4 after h1 -->
    <h4>Featured Products</h4>

    <div class="product-card">
      <!-- Another image with no alt text -->
      <img src="/product1.jpg">
      <p class="name">Widget Pro</p>
      <p>£29.99</p>
      <!-- Ambiguous link text tells the user nothing about the destination -->
      <a href="/product/1">click here</a>
    </div>

    <div class="product-card">
      <img src="/product2.jpg" alt="Gadget Max product photo">
      <p class="name">Gadget Max</p>

      <form>
        <!-- Text input with only a placeholder — no <label> element -->
        <input type="email" placeholder="Enter email for updates">

        <!-- Icon-only button: no accessible name (no aria-label, no visible text) -->
        <button>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M5 12l5 5L20 7"/>
          </svg>
        </button>
      </form>
    </div>

  </div>
</body>
</html>
